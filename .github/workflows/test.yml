name: test
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # Run inside the same Playwright image the local dev provider uses, so
    # screenshot rendering is identical between dev (Mac via docker) and CI.
    # Keep this tag in sync with the `playwright` version in pnpm-lock.yaml.
    container: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs
          path: packages/streaming-json-viewer/.vitest-attachments/tests/**/*.png
          retention-days: 7
